name: Deploy to Single Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🚀 Deploy via SSH
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script_stop: true   # SSH 명령 실패 시 즉시 중단
        script: |
          set -e

          # 1. 프로젝트 디렉토리로 이동
          cd ~/traiding-bot

          # 2. 최신 코드로 강제 동기화 (로컬 변경사항 무시)
          git fetch origin main
          git reset --hard origin/main

          # 3. 컨테이너 중지 후 빌드 캐시 삭제
          docker-compose down
          docker builder prune -f

          # 4. 이미지 재빌드 후 컨테이너 재시작
          docker-compose up --build -d

          # 5. 컨테이너 정상 실행 확인
          docker-compose ps

          # 6. 오래된 이미지 정리
          docker image prune -f

          echo "✅ Deployment Successful!"

# 💡 GitHub Secrets 설정 (Settings → Secrets and variables → Actions):
#    - SERVER_IP: 서버 공인 IP
#    - SERVER_USERNAME: 서버 접속 계정 (예: ubuntu, root)
#    - SSH_PRIVATE_KEY: 서버 SSH 개인 키 내용
#
