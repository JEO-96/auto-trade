name: Deploy to Single Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 🚀 Deploy via SSH
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script_stop: true
        command_timeout: 30m
        script: |
          set -e

          cd ~/traiding-bot

          # 1. 최신 코드로 동기화
          git fetch origin main
          git reset --hard origin/main

          # 2. 컨테이너 중지 (빌드 캐시는 유지하여 빌드 속도 향상)
          docker-compose down

          # 3. 이미지 재빌드 후 컨테이너 재시작
          docker-compose up --build -d

          # 4. 헬스체크 (최대 60초 대기)
          echo "Waiting for services to be healthy..."
          for i in $(seq 1 12); do
            if curl -sf http://localhost:8000/docs > /dev/null 2>&1; then
              echo "Backend is healthy!"
              break
            fi
            echo "Waiting... ($i/12)"
            sleep 5
          done

          docker-compose ps

          # 5. 미사용 이미지만 정리 (빌드 캐시 유지)
          docker image prune -f

          echo "Deployment Successful!"

# 💡 GitHub Secrets 설정 (Settings → Secrets and variables → Actions):
#    - SERVER_IP: 서버 공인 IP
#    - SERVER_USERNAME: 서버 접속 계정 (예: ubuntu, root)
#    - SSH_PRIVATE_KEY: 서버 SSH 개인 키 내용
#
