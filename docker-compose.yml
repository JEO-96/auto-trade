version: '3.8'

services:
  backend:
    build:
      context: ./backend
    restart: always
    # ports: - "8000:8000" # Internalized: only Nginx talks to it
    volumes:
      - ./backend/trading_bot.db:/app/trading_bot.db
    environment:
      - PORT=8000

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=/api # Use relative path to avoid DNS resolution issues on the client side
        - NEXT_PUBLIC_KAKAO_CLIENT_ID=${NEXT_PUBLIC_KAKAO_CLIENT_ID}
    restart: always
    # ports: - "3000:3000" # Internalized: only Nginx talks to it
    depends_on:
      - backend
    environment:
      - NODE_ENV=production

  nginx:
    build:
      context: ./nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
