<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="140" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="36" y1="90" x2="144" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="url(#bgGrad)"/>
  <!-- Chart bars -->
  <rect x="36" y="110" width="20" height="32" rx="4" fill="url(#barGrad)" opacity="0.4"/>
  <rect x="62" y="92" width="20" height="50" rx="4" fill="url(#barGrad)" opacity="0.55"/>
  <rect x="88" y="72" width="20" height="70" rx="4" fill="url(#barGrad)" opacity="0.7"/>
  <rect x="114" y="52" width="20" height="90" rx="4" fill="url(#barGrad)" opacity="0.85"/>
  <!-- Trend line -->
  <path d="M46 104 L72 86 L98 64 L124 44" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Data points -->
  <circle cx="46" cy="104" r="4" fill="#8B5CF6"/>
  <circle cx="72" cy="86" r="4" fill="#8B5CF6"/>
  <circle cx="98" cy="64" r="4" fill="#8B5CF6"/>
  <circle cx="124" cy="44" r="4.5" fill="#A78BFA"/>
  <!-- Checkmark badge -->
  <g transform="translate(130, 122)">
    <circle cx="0" cy="0" r="14" fill="#10B981"/>
    <path d="M-6 0 L-2 4 L6 -3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
