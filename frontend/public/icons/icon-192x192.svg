<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="152" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="36" y1="96" x2="156" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bgGrad)"/>
  <rect x="3" y="3" width="186" height="186" rx="37" fill="none" stroke="#1E293B" stroke-width="1.5"/>
  <!-- Chart bars with gradient -->
  <rect x="32" y="118" width="22" height="34" rx="4" fill="url(#barGrad)" opacity="0.4"/>
  <rect x="62" y="98" width="22" height="54" rx="4" fill="url(#barGrad)" opacity="0.55"/>
  <rect x="92" y="74" width="22" height="78" rx="4" fill="url(#barGrad)" opacity="0.7"/>
  <rect x="122" y="54" width="22" height="98" rx="4" fill="url(#barGrad)" opacity="0.85"/>
  <!-- Trend line with glow -->
  <path d="M43 112 L73 90 L103 66 L133 44" stroke="url(#lineGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <!-- Data points -->
  <circle cx="43" cy="112" r="4.5" fill="#8B5CF6"/>
  <circle cx="73" cy="90" r="4.5" fill="#8B5CF6"/>
  <circle cx="103" cy="66" r="4.5" fill="#8B5CF6"/>
  <circle cx="133" cy="44" r="5" fill="#A78BFA"/>
  <!-- Pulse at peak -->
  <circle cx="133" cy="44" r="9" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.5">
    <animate attributeName="r" values="9;15;9" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Checkmark (verified/backtested) -->
  <g transform="translate(140, 130)">
    <circle cx="0" cy="0" r="16" fill="#10B981"/>
    <path d="M-7 0 L-2 5 L7 -4" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
