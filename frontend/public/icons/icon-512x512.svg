<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="400" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="90" y1="256" x2="420" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  <rect x="6" y="6" width="500" height="500" rx="90" fill="none" stroke="#1E293B" stroke-width="2"/>
  <!-- Chart bars -->
  <rect x="82" y="310" width="60" height="90" rx="10" fill="url(#barGrad)" opacity="0.4"/>
  <rect x="162" y="258" width="60" height="142" rx="10" fill="url(#barGrad)" opacity="0.55"/>
  <rect x="242" y="194" width="60" height="206" rx="10" fill="url(#barGrad)" opacity="0.7"/>
  <rect x="322" y="138" width="60" height="262" rx="10" fill="url(#barGrad)" opacity="0.85"/>
  <!-- Trend line with glow -->
  <path d="M112 296 L192 240 L272 178 L352 118" stroke="url(#lineGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <!-- Data points -->
  <circle cx="112" cy="296" r="12" fill="#8B5CF6"/>
  <circle cx="192" cy="240" r="12" fill="#8B5CF6"/>
  <circle cx="272" cy="178" r="12" fill="#8B5CF6"/>
  <circle cx="352" cy="118" r="13" fill="#A78BFA"/>
  <!-- Pulse at peak -->
  <circle cx="352" cy="118" r="22" fill="none" stroke="#A78BFA" stroke-width="3" opacity="0.5">
    <animate attributeName="r" values="22;38;22" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Checkmark badge (verified/backtested) -->
  <g transform="translate(372, 345)">
    <circle cx="0" cy="0" r="42" fill="#10B981"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#059669" stroke-width="2"/>
    <path d="M-18 0 L-6 12 L18 -10" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
