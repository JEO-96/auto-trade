# ──────────────────────────────────────────────
# Upstream 정의 — 컨테이너 재시작 시 자동 재연결
# ──────────────────────────────────────────────
upstream backend_upstream {
    server backend:8000;
    keepalive 8;
}

upstream frontend_upstream {
    server frontend:3000;
    keepalive 8;
}

server {
    listen 80;
    server_name backtested.bot www.backtested.bot;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name backtested.bot www.backtested.bot;

    ssl_certificate /etc/letsencrypt/live/backtested.bot/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/backtested.bot/privkey.pem;

    # ──────────────────────────────────────────
    # 무중단 배포: 컨테이너 교체 시 재시도 설정
    # ──────────────────────────────────────────
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # DNS 캐시 방지 — 컨테이너 IP 변경 시 즉시 반영
    resolver 127.0.0.11 valid=5s;

    # Backend API requests
    location /api/ {
        proxy_pass http://backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 502/504 시 사용자에게 잠시 후 재시도 안내
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;
    }

    # Frontend (Next.js) requests
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;
    }

    # 502/503 에러 시 커스텀 응답 (배포 중 표시)
    error_page 502 503 /deploying.html;
    location = /deploying.html {
        internal;
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="3"><title>Backtested</title><style>body{background:#0a0e1a;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;font-family:sans-serif;text-align:center}h2{font-size:1.2rem;font-weight:400;opacity:0.7}</style></head><body><div><h1>Backtested</h1><h2>서비스 업데이트 중입니다. 잠시 후 자동으로 새로고침됩니다...</h2></div></body></html>';
    }
}
